# Owner classes: vendor entries below are byte-identical upstream mechanisms;
# project-owned paths are everything else and are merged, never overwritten;
# generated routing/shell blocks come only from sync-routing.sh; runtime data,
# secrets, caches, and local instances stay gitignored and never enter sync.
# scripts/sync-vendor.sh syncs only this vendor block during update-upstream:
# base = the upstream version at your recorded .upstream-sync synced_sha;
# a local file matching base is provably unedited and safe to overwrite,
# a local file differing from base is reported, never overwritten.
# Allowed vendor owners are this manifest, protocol-blocks/**, and scripts/**;
# all other paths are rejected even if someone adds them to this block.
# This manifest is itself vendor-class: upstream's copy wins on sync.
vendor:
  - sync-manifest.yaml
  - protocol-blocks/ambiguous-request-gate.md
  - protocol-blocks/reboot-check.md
  - protocol-blocks/subagent-contract.md
  - scripts/audit-orphans.sh
  - scripts/check-version-conformance.sh
  - scripts/route-health.sh
  - scripts/route-reachability.sh
  - scripts/smoke-test.sh
  - scripts/sync-routing.sh
  - scripts/sync-vendor.sh
  - scripts/upstream-status.sh
