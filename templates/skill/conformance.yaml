# Downstream behavior contract for the reusable scaffold.
# Validated by scripts/check-version-conformance.sh. Keep only load-bearing
# behavior anchors here; routing, generated blocks, links, and budgets have
# their own checks.

required_sections:
  - file: workflows/plan-feature.md
    must_contain:
      - "## Complexity Gate"
      - "## Question Gate"
      - "## Business-Semantics Gate"
      - "## Complex Plan"
      - "[workflow-state:planning]"
    must_not_contain:
      - "Pervasive reverse-question — default habit"
      - "one per lens"

  - file: workflows/plan-large.md
    must_contain:
      - "## Multi-Perspective Analysis"
      - "## Angle Contract"
      - "## Synthesis"
      - "## Parallel Analysis"

  - file: workflows/task-closure.md
    must_contain:
      - "## Task Closure Protocol"
      - "### Rationalizations to Reject"
      - "### Red Flags"
      - "## After-Action Review"

  - file: workflows/update-rules.md
    must_contain:
      - "### Recording Threshold"
      - "### Fidelity Gate"
      - "### Reconciliation Gate"
      - "### Activation Check"
      - "### Generalization Rule"

  - file: workflows/maintain-docs.md
    must_contain:
      - "## Step 2: Independent Load-Reason Audit"
      - "## Step 5: Semantic Before/After Reconciliation"

  - file: workflows/fix-bug.md
    must_contain:
      - "## Mandatory Pre-Step"
      - "Design-or-defect gate"
      - "Task Closure Protocol"
    must_not_contain:
      - "Pervasive reverse-question — default habit"
      - "directly `spawn_agent`"

  - file: rules/agent-behavior.md
    must_contain:
      - "## 4. Minimal Context, Sufficient Evidence"
      - "explicit boundaries/non-goals"
      - "Run scoped, reversible work end-to-end"
      - "diagnostic signals, not objectives"
      - "## 6. Delegate Only for Net Benefit"
      - "Inline is the default"
    must_not_contain:
      - "must directly call `spawn_agent`"
      - "continuous self-judgment + auto-dispatch"

  - file: workflows/subagent-auxiliary.md
    must_contain:
      - "## Admission Test"
      - "## Main-Agent Boundary"
      - "## Interception Transparency"

  - file: workflows/subagent-driven.md
    must_contain:
      - "## Mode Selection"
      - "## Mode 2 Entry"
      - "## Harness Compatibility"
    must_not_contain:
      - "Iron Law (violation = task failure"
      - "must directly call `spawn_agent`"

  - file: workflows/subagent-orchestration.md
    must_contain:
      - "## 1. Contract"
      - "## 3. Main-Agent Review"
      - "does **not** run project-wide Task Closure"

  - file: workflows/receiving-review.md
    must_contain:
      - "## Process"
      - "Verify every claim"

  - file: workflows/update-upstream.md
    must_contain:
      - "## Hard Rules"
      - "## Procedure"
      - "conformance.yaml"

  - file: workflows/change-managed.md
    must_not_contain:
      - "Pervasive reverse-question — default habit"
      - "directly `spawn_agent`"

  - file: workflows/refactor-fanout.md
    must_not_contain:
      - "batch by physical region anyway to enable parallel dispatch"
      - "Full test suite passes"

required_files:
  - path: routing.yaml
