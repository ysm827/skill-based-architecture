<g class="c-amber"><rect x="526" y="570" width="98" height="44" rx="8" stroke-width="0.5"/><text class="th" x="575" y="592" text-anchor="middle" dominant-baseline="central">桶 A/B/C</text></g>
<line x1="340" y1="626" x2="340" y2="646" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="650" width="600" height="92" rx="12" fill="none" stroke="#185FA5" stroke-width="0.9" stroke-dasharray="4 3"/>
<text class="th" x="56" y="670" text-anchor="start" dominant-baseline="central">⑥ 维护 / 校验脊柱 · 回灌 ③ 真源 · 保证可达（激活 not 存储）</text>
<g class="c-blue"><rect x="56" y="686" width="108" height="44" rx="8" stroke-width="0.5"/><text class="ts" x="110" y="708" text-anchor="middle" dominant-baseline="central">sync-routing</text></g>
<g class="c-blue"><rect x="168" y="686" width="108" height="44" rx="8" stroke-width="0.5"/><text class="ts" x="222" y="708" text-anchor="middle" dominant-baseline="central">smoke-test</text></g>
<g class="c-blue"><rect x="280" y="686" width="108" height="44" rx="8" stroke-width="0.5"/><text class="ts" x="334" y="708" text-anchor="middle" dominant-baseline="central">reachability</text></g>
<g class="c-blue"><rect x="392" y="686" width="108" height="44" rx="8" stroke-width="0.5"/><text class="ts" x="446" y="708" text-anchor="middle" dominant-baseline="central">audit-orphans</text></g>
