<g class="c-gray"><rect x="256" y="80" width="368" height="44" rx="8" stroke-width="0.5"/><text class="th" x="440" y="102" text-anchor="middle" dominant-baseline="central">harness：Claude Code · Cursor · Codex · Gemini</text></g>
