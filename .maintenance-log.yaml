# Maintenance ledger — Tier-2 reorganization state per long-lived file.
# Schema + write protocol: templates/skill/workflows/maintain-docs.md § Step 7.
# Read by smoke-test.sh § 2a when a duplicate ## heading is found in
# references/*gotcha*.md or references/*pitfall*.md.
#
# This file is per-skill state, NOT a template. Each downstream skill
# maintains its own at `skills/<name>/.maintenance-log.yaml`. The upstream
# self-hosting repo keeps the equivalent here at the repo root and treats
# it the same way a downstream skill would.

files:
  - path: UPSTREAM-CHANGES.md
    notes: |
      Archive policy ~300 lines / 8 entries (see file header).
      2026-06-10: archive pass done — entries at/before the downstream sync
      point (064f5ac) moved to UPSTREAM-CHANGES-archive.md; main keeps the
      newest few. Next pass when > ~8 entries / 300 lines again.

  - path: workflows/full-migration.md
    notes: |
      2026-06-10: 258 lines vs generic 100 workflow cap — explicit decision:
      ACCEPT. The 9-phase migration procedure is one linear narrative; phases
      are not independently navigable, so the split test fails. Revisit only
      if a phase grows its own sub-procedures.

  - path: scripts/sync-self-shells.sh
    notes: |
      2026-06-10: 291 lines vs generic 220 script cap — explicit decision:
      ACCEPT. Upstream-only whole-shell generator; cohesion beats splitting
      and the header docs are load-bearing. Revisit only past ~320 lines or
      if it gains a second concern.

  - path: examples/behavior-failures.md
    notes: |
      AAR / lesson log; entries-style. 7 entries.
      Tier-2 baseline pending — run on next dedup signal or by 2026-08.
